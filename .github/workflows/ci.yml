name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

jobs:
  # Install dependencies and setup
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

  # Backend - API Type Checking
  backend-typecheck:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@finance-app/api run type-check
        name: Type check API

  # Backend - API Build
  backend-build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@finance-app/shared run build
        name: Build shared package
      - run: pnpm --filter=@finance-app/api run build
        name: Build API

  # Backend - API Tests
  backend-test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@finance-app/api run test
        name: Run API tests
        continue-on-error: true
      - run: pnpm --filter=@finance-app/api run test:cov
        name: Generate coverage
        continue-on-error: true

  # Frontend - Web Type Checking
  frontend-typecheck:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@finance-app/web run type-check
        name: Type check Web

  # Frontend - Web Build
  frontend-build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@finance-app/web run build
        name: Build Web

  # Frontend - Web Tests
  frontend-test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@finance-app/web run test
        name: Run Web tests
        continue-on-error: true
      - run: pnpm --filter=@finance-app/web run test:cov
        name: Generate coverage
        continue-on-error: true

  # Linting
  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
        name: Run linting
        continue-on-error: true

  # Summary
  all-checks:
    runs-on: ubuntu-latest
    needs: [backend-typecheck, backend-build, backend-test, frontend-typecheck, frontend-build, frontend-test, lint]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.backend-typecheck.result }}" == "failure" ] || \
             [ "${{ needs.backend-build.result }}" == "failure" ] || \
             [ "${{ needs.frontend-typecheck.result }}" == "failure" ] || \
             [ "${{ needs.frontend-build.result }}" == "failure" ]; then
            echo "❌ Build failed!"
            exit 1
          fi
          echo "✅ All checks passed!"
